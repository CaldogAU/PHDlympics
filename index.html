<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHDTournament</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">PHDTournament</p>
      <h1 id="pageTitle">Tournament Manager</h1>
      <p class="lede">A browser-based Swiss-style tournament manager.</p>
    </div>

    <div class="header-actions">
      <span id="saveStatus">Ready</span>
      <button id="themeToggle" type="button">Toggle Theme</button>
    </div>
  </header>

  <main class="app-layout">
    <section class="card">
      <h2>Project Status</h2>
      <p>This is the clean modular project shell.</p>
      <p class="muted">Next package: tournament setup and autosave.</p>
    </section>

    <section class="card">
      <h2>Modules Loaded</h2>
      <ul id="moduleList"></ul>
    </section>
  </main>

  <script src="js/state.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/teams.js"></script>
  <script src="js/ladder.js"></script>
  <script src="js/rounds.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
